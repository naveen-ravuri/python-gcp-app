steps:

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/python-repo/python-app', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/python-repo/python-app']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - python-app
    - --image
    - us-central1-docker.pkg.dev/$PROJECT_ID/python-repo/python-app
    - --region
    - us-central1
    - --platform
    - managed
    - --allow-unauthenticated